<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>keyframes</title>
    <style>
      div {
        display: flex;
        justify-content: center;
        align-items: center;
        /* 위 3가지 암기하기 */
        height: 100vh;
      }
      h2 {
        color: #ffff;
        font-size: 3rem;
        transition: 2s ease-in;
        animation: items 0.7 ease-in infinite alternate;
        line-height: 1.2;
      }
      h2:hover {
        color: red;
        animation: none;
      }
      @keyframes items {
        0% {
          padding: 10px;
          background-color: cornsilk;
        }
        100% {
          padding: 5px;
          background-color: chartreuse;
        }
      }
    </style>
  </head>
  <body>
    <h1></h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div>h2{반가워요} -->
    <div>
      <h2>반가워요</h2>
    </div>
  </body>
</html>
