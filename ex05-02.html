<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position</title>
    <style>
      .table-wrapper {
        max-height: 200px;
        overflow: auto; /* 자동 스크롤 바 */
      }
      table {
        width: 100%;
        border-collapse: collapse;
        /* position: fixed; */
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center; /* 글자 가운데 정렬 */
      }
      thead,
      tfoot {
        position: sticky;
        color: white;
        background-color: rgb(9, 60, 153);
      }
      thead {
        top: 0;
      }
      tfoot {
        bottom: 0;
      }
      #fix {
        position: fixed;
        /* left: 100px; */
        light: 100px;
        bottom: 170px;
        background-color: coral;
        padding: 10px;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 1.7rem;
        color: white;
        text-align: center;
        line-height: 1;
        box-shadow: 5px 5px 20px 2px black;
      }
    </style>
  </head>
  <body>
    <h1>position fixed</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div.table-wrapper>table>thead>tr>th*4^^tbody>(tr>td*4)*10^^tfoot>tr>td*4 -->

      <table>

        </thead>
        <tbody>

          </tr>
          <tr>

          </tr>
          <tr>
            <td>3</td>

            <td>도사</td>
          </tr>
          <tr>
            <td>4</td>
            <td>이순신</td>

          </tr>
          <tr>
            <td>5</td>

          </tr>
          <tr>
            <td>6</td>

          <tr>
            <td>7</td>

        </tbody>
        <tfoot>
          <tr>

          </tr>
        </tfoot>
      </table>
    </div>
    <div id="fix">^</div>
  </body>
</html>
