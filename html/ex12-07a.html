<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 480vh;
      }
      section {
        height: 95vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: burlywood;
        background-color: aliceblue;
        font-size: 3rem;
      }
      section:nth-of-type(even) {
        background-color: rgb(176, 231, 235);
        color: cadetblue;
      }
      .scroll-text {
        position: fixed;
        top: 250px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.3rem;
        font-weight: bold;
        box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.479);
        padding: 10px;
        border-radius: 20px;
      }
      .left-menu,
      .right-menu {
        position: fixed;
        height: 250px;
        color: white;
        padding: 20px;
        border-radius: 10px;
        top: 100px;
        opacity: 0;
        transition: 0.5s ease;
        z-index: 10;
      }
      .right-menu {
        width: 250px;
        right: -200px;
        background-color: rgba(146, 78, 15, 0.651);
      }
      .left-menu {
        width: 150px;
        background-color: rgba(47, 141, 204, 0.651);
        left: -200px;
      }
      .left-menu2 {
        left: -200px;
        top: 500px;
        width: 500px;
        background-color: rgba(16, 155, 109, 0.651);
      }
      .left-show {
        opacity: 1;
        left: 10px;
      }
      .right-show {
        opacity: 1;
        right: 10px;
      }
      ul {
        padding-left: 15px;
      }
      .end-line {
        display: flex;
        justify-content: center;
      }
      .end-menu {
        position: fixed;
        bottom: 0;
        font-size: 2rem;
        background-color: rgb(240, 94, 49);
        color: white;
        padding: 20px;
        border-radius: 10px;
        height: 50px;
        text-align: center;
        transition: 0.5s ease;
        width: 22%;
        opacity: 0;
      }
      .end-show {
        width: 100%;
        opacity: 1;
      }
      .t1 {
        font-size: 1rem;
        color: black;
        transform: scaleX(-1);
        transition: 1s ease;
      }
      tr,
      td {
        text-align: center;
        width: 200px;
        height: 50px;
        border: 1px solid #ccc;
      }
      .turn {
        transform: scaleX(1);
      }
    </style>
  </head>
  <body>
    <div class="scroll-text" id="scrollText">
      첫 단계에요. 스크롤을 내려보세요.
    </div>

    <div class="left-menu" id="leftMenu"></div>

    <div class="right-menu" id="rightMenu">
      오른쪽 메뉴
      <ul>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
        <li>Lorem, ipsum dolor.</li>
      </ul>
    </div>
    <div class="end-line">
      <div class="end-menu" id="endMenu">감사합니다.</div>
    </div>

    <section>1단계</section>
    <section>2단계</section>
    <section>
      3단계
      <table class="t1">
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
        <tr>
          <td>테스트1</td>
          <td>테스트2</td>
          <td>테스트3</td>
        </tr>
      </table>
    </section>
    <section>4단계</section>
    <section>End Line</section>
    <script>
      const scrollText = document.getElementById("scrollText");
      const leftMenu = document.getElementById("leftMenu");
      const rightMenu = document.getElementById("rightMenu");
      const endMenu = document.getElementById("endMenu");
      const t1 = document.querySelector(".t1");

      window.addEventListener("scroll", () => {
        const scrollY = window.scrollY;
        console.log(scrollY);
        /* 스크롤 위치에 따른 텍스트를 변경 */
        if (scrollY > 100 && scrollY <= 800) {
          scrollText.textContent = "지금은 1단계 입니다.";
        }
        if (scrollY > 800 && scrollY <= 1600) {
          scrollText.textContent = "지금은 2단계 입니다.";
          t1.classList.remove("turn");
        }
        if (scrollY > 1600 && scrollY <= 2400) {
          scrollText.textContent = "지금은 3단계 입니다.";
          t1.classList.add("turn");
        }
        if (scrollY > 2400 && scrollY <= 3400) {
          scrollText.textContent = "지금은 4단계 입니다.";
          t1.classList.remove("turn");
        }
        if (scrollY > 3400) {
          scrollText.textContent = "마지막 구간입니다.";
        }

        if (scrollY > 500 && scrollY < 1900) {
          leftMenu.classList.add("left-show");
          leftMenu.innerHTML = `왼쪽메뉴 <ul>
        <li> 실시간 스크롤 값</li>
        <li>${scrollY}</li>
        <li> 왼쪽메뉴 사라짐</li>
        <li> 투명도 0에서 1로</li>
      </ul>`;
        } else {
          leftMenu.classList.remove("left-show");
        }
        if (scrollY > 1500 && scrollY < 2800) {
          rightMenu.classList.add("right-show");
        } else {
          rightMenu.classList.remove("right-show");
        }

        if (scrollY > 1900 && scrollY < 3300) {
          leftMenu.classList.add("left-show");
          leftMenu.classList.add("left-menu2");
          leftMenu.innerHTML = `변형메뉴 <ul>
          <li> 변형된 메뉴</li>
          <li>${scrollY}</li>
          <li> 아래로 이동</li>
          <li> 초록색으로 변형</li>
        </ul>`;
        } else {
          leftMenu.classList.remove("left-menu2");
        }
        const toTop = () => window.scrollTo({ top: 0, behavior: "smooth" });

        if (scrollY > 3350) {
          endMenu.classList.add("end-show");

          setTimeout(toTop, 1500);
        } else {
          endMenu.classList.remove("end-show");
        }
      });
    </script>
  </body>
</html>
