<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학점 출력</title>
    <script>
      const inp = Number(prompt("점수를 입력하면 학점이 나옵니다.", 1)); // * 1;
      console.log(typeof inp, inp);
      if (inp === 100) {
        console.log("A++ 입니다.");
        alert("A++ 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 A++ 입니다.</h2>`);
      } else if (inp >= 90) {
        console.log("A 입니다.");
        alert("A 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 A 입니다.</h2>`);
      } else if (inp >= 80) {
        console.log("B 입니다.");
        alert("B 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 B 입니다.</h2>`);
      } else if (inp >= 70) {
        console.log("C 입니다.");
        alert("C 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 C 입니다.</h2>`);
      } else if (inp >= 60) {
        console.log("D 입니다.");
        alert("D 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 D 입니다.</h2>`);
      } else {
        console.log("F 입니다.");
        alert("F 입니다.");
        document.write(`<h2>입력하신 ${inp}점은 F 입니다.</h2>`);
      }
    </script>
  </head>
  <body></body>
</html>
