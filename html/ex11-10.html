<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <script>
      const arr1 = [11, 22, 33, 44, 55];
      console.log(arr1);
      console.log("===== map =====");
      const arr2 = arr1.map((v) => v * 10);
      console.log(arr2);
      const arr3 = arr1.map((v, i, a) => {
        console.log(v, i, a);
      });
      console.log("===== filter =====");
      const fn1 = (v) => v % 2 == 0;
      const fn2 = (v) => v % 3 == 0 || v % 5 == 0;
      const arr22 = arr1.filter(fn2);
      //   const arr22 = arr1.filter((v) => v % 2 == 0);
      console.log(arr22);
    </script>
  </body>
</html>
