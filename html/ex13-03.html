<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로컬스토리지</title>
  </head>
  <body>
    <h2>localStorage 사용법</h2>
    <ol>
      <li><mark>무조건 Str 형식으로 저장됨</mark></li>
      <li>영구저장됨</li>
    </ol>
    <ul>
      <h2>기본 사용법 4가지</h2>
      <li>localStorage.setItem("key","value"):저장</li>
      <li>localStorage.getItem("key"):조회</li>
      <li>localStorage.removeItem("key"):삭제</li>
      <li>localStorage.clear():전체삭제</li>
    </ul>
    <hr />
    <input type="text" id="name" placeholder="이름 입력" />
    <button id="save">저장</button>
    <button id="load">불러오기</button>
    <hr />
    <button id="obj-save">객체저장</button>
    <button id="obj-load">객체로드</button>
    <hr />
    <h2 id="disp"></h2>

    <script>
      const name = document.getElementById("name");
      const disp = document.getElementById("disp");
      const objSave = document.getElementById("obj-save");
      const objLoad = document.getElementById("obj-load");

      /* localStorage에 저장 */
      document.getElementById("save").onclick = () =>
        localStorage.setItem("첫번째키", name.value);

      /* localStorage로 부터 로드 */
      const load = document.getElementById("load");
      load.addEventListener("click", () => {
        disp.textContent = localStorage.getItem("첫번째키");
      });

      /* localStorage에 객체를 저장 */
      const obj = [
        { id: 1, name: "홍길동", age: 22 },
        { id: 2, name: "슈퍼맨", age: 33 },
      ];

      const obj1 = { id: 1, name: "홍길동", age: 22 };
      objSave.addEventListener("click", () => {
        localStorage.setItem("객체넣기", JSON.stringify(obj));
      });

    </script>
  </body>
</html>
