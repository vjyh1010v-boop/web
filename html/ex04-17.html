<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background</title>
    <style>
      #container {
        width: 100%;
        height: 700px;
        margin: 50px auto;
        border: 1px solid #ccc;
      }
      .box {
        width: 300px;
        height: 300px;
        margin: 20px;
        border: 1px solid coral;
        float: left;
        background: url(https://wimg.heraldcorp.com/news/cms/2025/05/16/news-p.v1.20250516.5e12d5297bc64873ac98662dd4f68d5c_P1.jpg);
      }
      #bg1 {
        background-size: auto;
      }
      #bg2 {
        background-size: 300px;
      }
      #bg3 {
        background-size: 50%;
      }
      #bg4 {
        background-size: 100% 100%;
      }
      #bg5 {
        background-size: contain;
      }
      #bg6 {
        background-size: cover;
        background-position: -100px 0;
      }
    </style>
  </head>
  <body>
    <h1>background</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div#container>(div.box#bg$)*6 -->
    <div id="container">
      <div class="box" id="bg1"></div>
      <div class="box" id="bg2"></div>
      <div class="box" id="bg3"></div>
      <div class="box" id="bg4"></div>
      <div class="box" id="bg5"></div>
      <div class="box" id="bg6"></div>
    </div>
  </body>
</html>
