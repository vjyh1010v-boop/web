<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 스켈레톤</title>
    <style>
      body {
        background-color: aliceblue;
      }
      .skeleton-card {
        background-color: white;
        max-width: 500px;
        padding: 1.5rem;
        border-radius: 10px;
        margin: 20px auto;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .skeleton {
        background-color: #ddd;
        border-radius: 8px;
        position: relative;
        overflow: hidden;
      }
      .skeleton.title {
        height: 24px;
        width: 60%;
        margin-bottom: 1rem;
      }
      .skeleton.text {
        height: 14px;
        width: 100%;
        margin-bottom: 1rem;
      }
      .skeleton.short {
        height: 12px;
        width: 40%;
      }

      .skeleton::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          #ffffffaa,
          transparent
        );
        animation: loading 1.2s infinite;
      }
      @keyframes loading {
        from {
          left: -100%;
        }
        to {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <h1>CSS 스켈레톤</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- (div.skeleton-card>div.skeleton*4)*4 -->
    <div class="skeleton-card">
      <div class="skeleton title"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton title"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton title"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton title"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text"></div>
      <div class="skeleton text short"></div>
    </div>
  </body>
</html>
