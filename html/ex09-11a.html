<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      #box {
        background-color: rgb(235, 216, 191);
        width: 400px;
        height: 300px;
        margin: 30% auto;
        padding: 40px 10px 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
      #box > div {
        height: 30px;
        margin: 5px;
        background-color: rgb(42, 154, 206);
      }
    </style>
  </head>
  <body>
    <div id="box">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </body>
</html>
