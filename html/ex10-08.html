<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수선언식으로 게임</title>
  </head>
  <body>
    영웅의 이름을 입력하세요 <input type="text" /> <br />
    영웅의 레벨을 입력하세요 <input type="text" /> <br />
    영웅의 스킬을 입력하세요 <input type="text" /> <br />
    <button>실행</button>
    <hr />
    <script>
      function lol(heroName, level = 1, callback = fire) {
        document.write("===========================<br>");
        document.write(`${heroName}님이 ${level}레벨이 되었습니다.<br>`);
        document.write("===========================<br>");

        if (level >= 6) {
          document.write(`${heroName}님이 궁극기를 씁니다.<br>`);
          callback(level);
        } else {
          document.write(`${heroName}님이 깨작 평타를 때립니다.<br>`);
        }
      }

      function fire(ff) {
        for (let i = 1; i < ff + 1; i++) {
          document.write(`${ff}레벨 이어서 ${1}개 메테오를 던집니다.<br>`);
        }
      }
      function ice(ii) {
        for (let i = 1; i < ii + 1; i++) {
          document.write(`${ii}레벨 이어서 ${i * 2}개 얼음을 던집니다.<br>`);
        }
      }
      function slow(ss) {
        for (let i = ss; 0 < i; i--) {
          document.write(
            `${ss}레벨 이어서 다리를 공격하여 이동속도를 ${i}% 줄입니다.<br>`,
          );
        }
      }
      lol("소서리스", 7, slow);
    </script>
  </body>
</html>
