<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <script>
      const arr = [11, 22, 33, 44, 55];
      console.log(arr);
      console.log("===== map 와 filter 의 메소드체이닝 =====");
      const fn1 = (v) => v * 10;
      const fn2 = (v) => v % 3 == 0 || v % 5 == 0;

      const result = arr.filter(fn2).map(fn1);
      console.log(result);
    </script>
  </body>
</html>
