<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>switch 구문</title>
  </head>
  <body>
    <script>
      const str = prompt("내 밑으로 집할할 사람을 입력하세요.");
      switch (str) {
        case "병장":
          console.log("병장입니다.");
        //   break;
        case "상병":
          console.log("상병입니다.");
        //   break;
        case "일병":
          console.log("일병입니다.");
        //   break;
        case "이병":
          console.log("이병입니다.");
        //   break;
        case "훈련병":
          console.log("훈련병입니다.");
          break;
        default:
          console.log("그런 병사 없어요.");
          break;
      }
    </script>
  </body>
</html>
