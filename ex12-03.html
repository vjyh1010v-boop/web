<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <div>
      <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx = document.getElementById("myChart");
      const labels = ["일", "월", "화", "수", "목", "금", "토"];
      const box = [];
      for (let i = 0; i < 6; i++) {
        const ran = Math.floor(Math.random() * 100);
        box.push(ran);
      }
      const data = {
        labels: labels,
        datasets: [
          {
            label: "My First Dataset",
            data: box,
            backgroundColor: [
              // css를 건드리는 부분
              "rgba(255, 99, 132, 0.2)", // 색은 내맘대로 지정 가능
              "rgba(255, 159, 64, 0.2)",
              "rgba(255, 205, 86, 0.2)",
              "rgba(75, 192, 192, 0.2)",
              "rgba(54, 162, 235, 0.2)",
              "rgba(153, 102, 255, 0.2)",
              "rgba(201, 203, 207, 0.2)",
            ],
            borderColor: [
              // 라인을 건드리는 일
              "rgb(255, 99, 132)",
              "rgb(255, 159, 64)",
              "rgb(255, 205, 86)",
              "rgb(75, 192, 192)",
              "rgb(54, 162, 235)",
              "rgb(153, 102, 255)",
              "rgb(201, 203, 207)",
            ],
            borderWidth: 1,
          },
        ],
      };

      const config = {
        type: "bar",
        data: data,
        options: {
          scales: {
            y: {
              beginAtZero: true,
            },
          },
        },
      };
      new Chart(ctx, config);
    </script>
  </body>
</html>
