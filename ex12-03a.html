<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>버블 차트</title>
  </head>
  <body>
    <div>
      <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx = document.getElementById("myChart");

      // 1. 7개의 랜덤 버블 데이터 생성 (x, y 위치와 r 크기를 모두 랜덤으로!)
      const box = [];
      for (let i = 0; i < 7; i++) {
        const ran = Math.floor(Math.random() * 100);
        box.push(ran);
      }
      const data = {
        datasets: [
          {
            label: "First Dataset",
            data: [
              {
                x: 20,
                y: 30,
                r: 15,
              },
              {
                x: 40,
                y: 10,
                r: 10,
              },
            ],
            backgroundColor: "rgb(255, 99, 132)",
          },
        ],
      };
      const config = {
        type: "bubble",
        data: data,
        options: {},
      };

      new Chart(ctx, config);
    </script>
  </body>
</html>
