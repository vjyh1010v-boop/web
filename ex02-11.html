<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
      }
      th,
      td {
        border: 2px solid black;
        background-color: rgb(255, 233, 205);
        padding: 10px;
        width: 100px;
        height: 70px;
      }
      #row-line,
      #col-line {
        background-color: aqua;
      }
      .lines1 {
        background-color: darkcyan;
      }
      .bottom-lines {
        color: blue;
      }
      .lines2 {
        color: red;
      }
      .lines3 {
        background-color: yellow;
      }
      .lines4 {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>표구조 응용</h1>
    <hr />
    <a href="index.html">홈으로</a><br /><br />
    <table>
      <caption>
        표를 아파트 구조처럼 생각해보기
      </caption>
      <tr>
        <th>Line 1</th>
        <th>Line 2</th>
        <th>Line 3</th>
        <th>Line 4</th>
        <th>Line 5</th>
      </tr>
      <tr>
        <td class="lines1">1 행 1열</td>
        <td class="lines2">1 행 2열</td>
        <td class="lines2">1 행 3열</td>
        <td class="lines2 lines4">1 행 4열</td>
        <td rowspan="2" id="row-line">1 행 5열</td>
      </tr>
      <tr>
        <td class="lines1">2 행 1열</td>
        <td colspan="2" id="col-line">2 행 2열</td>
        <td class="lines4">2 행 3열</td>
      </tr>
      <tr>
        <td class="lines1 bottom-lines">3 행 1열</td>
        <td class="bottom-lines">3 행 2열</td>
        <td class="bottom-lines lines3">3 행 3열</td>
        <td class="bottom-lines lines3 lines4">3 행 4열</td>
        <td class="bottom-lines lines3">3 행 5열</td>
      </tr>
    </table>
  </body>
</html>
