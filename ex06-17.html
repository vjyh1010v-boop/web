<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필</title>
    <style>
      body {
        height: 100%;
      }
      .box {
        background-color: rgb(248, 222, 248);
        height: 100vh;
        /* padding-top: 8rem; */
        /* box-sizing: border-box; */
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background-color: white;
        max-width: 360px;
        height: 50%;
        display: flex;
        flex-direction: column;
        border-radius: 30px;
        overflow: hidden;
      }

      .banner {
        background-image: url(https://media.istockphoto.com/id/2128578711/ko/%EB%B2%A1%ED%84%B0/%EA%B3%BC%ED%95%99-%EB%B0%8F-%EC%97%B0%EA%B5%AC-%EB%8C%80%EC%8B%9C-%EC%B6%94%EC%83%81%EC%A0%81-%EB%B0%B0%EA%B2%BD-%EA%B0%81%EC%A7%84-%EB%8C%80%EC%8B%9C-%EB%B0%B0%EA%B2%BD-%ED%8C%A8%ED%84%B4%EC%9E%85%EB%8B%88%EB%8B%A4-%EC%B6%94%EC%83%81-%ED%8C%8C%EB%9E%80%EC%83%89-%EB%91%A5%EA%B7%BC-%EC%84%A0-%EB%8C%80%EA%B0%81%EC%84%A0-%ED%95%98%ED%94%84%ED%86%A4-%EC%A0%84%ED%99%98.jpg?s=612x612&w=0&k=20&c=jiQ8KHoJAlbdW4ZQRjtdnx3NQDoBolrex_8AU2z45Gc=);
        background-size: cover;
        height: 160px;
        display: flex;
        justify-content: center;
      }

      .profile {
        background-image: url(https://dimg.donga.com/wps/NEWS/IMAGE/2019/04/25/95215551.1.jpg);
        background-size: 150px;
        background-position: -10px 1px;
        border-radius: 50%;
        width: 130px;
        height: 130px;
        box-shadow: 5px 10px 30px rgba(0, 0, 0, 0.7);
        transform: translateY(60%);
        transition: transform 0.4s ease;
      }
      .profile:hover {
        transform: translateY(60%) scale(1.2);
      }
      .name {
        text-align: center;
        padding-top: 60px;
      }
      .follow-btn {
        padding: 0 2rem;
        display: flex;
        justify-content: center;
        flex-direction: column;
      }
      button {
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        background-color: yellow;
        border: none;
        padding: 20px;
        cursor: pointer;
      }
      .desc {
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <h1>프로필</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div.box>div.card>div.banner>div.profile^h2.name{Yusung}+div.follow-btn>button{Follow}+div.desc{내용들...} -->
    <div class="box">
      <div class="card">
        <div class="banner">
          <div class="profile"></div>
        </div>
        <h2 class="name">Yusung</h2>
        <div class="follow-btn"><button>Follow</button></div>
        <div class="desc">
          열실히 수업받는 여러분 정말 고생이 많습니다. 항상 노력하여 최고의
          프로그래머가 되도록 합시다.
        </div>
      </div>
    </div>
  </body>
</html>
