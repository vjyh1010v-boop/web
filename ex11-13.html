<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문서객체 생성하기</title>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const header = document.createElement("h1");
        header.textContent = "문서 객체 동적으로 생성 중...";
        header.style.color = "white";
        header.style.backgroundColor = "brown";
        header.setAttribute("id", "head");
        header.setAttribute("class", "system item"); // 덮어쓸 수 있으니 조심
        header.classList.add("title", "main", "header"); // 좀 중요
        document.body.appendChild(header);
      });
    </script>
  </head>
  <body></body>
</html>
