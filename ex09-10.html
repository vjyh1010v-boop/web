<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반복문 while</title>
  </head>
  <body>
    <script>
      let num = 0;
      while (num < 10) {
        console.log(num++, "제가 몇번 반복되나요.");
        // if (num >= 10) break;
      }
      num = 0;
      for (;;) {
        console.log(num++, "제가 몇번 반복되나요.");
        if (num >= 10) break;
      }
    </script>
  </body>
</html>
