<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에니메이션의 범위</title>
    <style>
      div {
        width: 200px;
        height: 200px;
        margin: 50px;
        background-color: aquamarine;
        border-radius: 10px;
        transition: all 1s ease;
      }
      div:hover {
        transform: rotate(100deg) scale(2) translate(50px);
      }
      p {
        position: relative;
        z-index: 10px;
      }
    </style>
  </head>
  <body>
    <h1>에니메이션의 범위</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div>transform</div>
    <p>hello world</p>
  </body>
</html>
