<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버아이콘</title>
    <style>
      ul {
        list-style: none;
      }
      li {
        /* background-color: aqua; */
        float: left;
        width: 40px;
        height: 40px;
        margin: 10px;
        border-radius: 10px;
        background-image: url(./sample_naver.png);
        background-size: 460px 457px;
      }
      .icon1 {
        background-position: -205px -219px;
      }
    </style>
  </head>
  <body>
    <h1>background(네이버아이콘)</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div class="menu">
      <ul>
        <li class="icon1"></li>
        <li class="icon2"></li>
        <li class="icon3"></li>
        <li class="icon4"></li>
      </ul>
    </div>
  </body>
</html>
