<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      h2 {
        text-align: center;
      }
      #box {
        background-color: rgb(235, 216, 191);
        width: 400px;
        height: 300px;
        margin: 10% auto;
        padding: 40px 10px 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.562);
      }
      #box > div {
        height: 30px;
        margin: 5px;
        background-color: rgb(74, 116, 172);
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.562);
        border-radius: 0 15px 15px 0;
      }

      table {
        width: 400px;
        margin: auto;
      }
      tr,
      th,
      td {
        background-color: rgb(14, 104, 107);
        color: white;
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.5);
        padding: 10px;
        text-align: center;
        font-weight: bold;
      }
      span {
        position: absolute;
        color: white;
        font-weight: bold;
        display: block;
        text-align: right;
        line-height: 1.7rem;
        margin: 0 5px;
      }
    </style>
  </head>
  <body>
    <script>
      const epoch = 100000; // 반복 횟수
      let turn = 0; // while에 사용하는 증가 값
      const arr = [0, 0, 0, 0]; // new Array(4)
      let verf = "검증중;";
      while (turn < epoch) {
        const ran = Math.floor(Math.random() * 100);
        let list = "";
        if (ran < 3) {
          arr[0]++;
        } else if (ran < 13) {
          arr[1]++;
        } else if (ran < 43) {
          arr[2]++;
        } else {
          arr[3]++;
        }
        turn++;
      }

      /* 검증프로그램 */
      if (epoch == arr[0] + arr[1] + arr[2] + arr[3]) {
        verf = "검증완료";
      } else {
        verf = "검증이상";
        alert("검증이상");
      }
      const arr0 = ((arr[0] / epoch) * 100).toFixed(1);
      const arr1 = ((arr[1] / epoch) * 100).toFixed(1);
      const arr2 = ((arr[2] / epoch) * 100).toFixed(1);
      const arr3 = ((arr[3] / epoch) * 100).toFixed(1);
      list = `<h2>${epoch}회 (${verf})</h2><table>
        <tr>
          <th>아이템</th>
          <th>기본확률</th>
          <th>개수</th>
          <th>통계</th>
        </tr>
        <tr>
          <td>유니크</td>
          <td>3%</td>
          <td>${arr[0]}</td>
          <td>${arr0}%</td>
        </tr>
        <tr>
          <td>레어</td>
          <td>10%</td>
          <td>${arr[1]}</td>
          <td>${arr1}%</td>
        </tr>
        <tr>
          <td>매직</td>
          <td>30%</td>
          <td>${arr[2]}</td>
          <td>${arr2}%</td>
        </tr>
        <tr>
          <td>일반</td>
          <td>57%</td>
          <td>${arr[3]}</td>
          <td>${arr3}%</td>
        </tr>
      </table>`;
      list += `<div id="box">
          <div style="width: ${arr0 * 1.5}%"><span>유니크 (${arr0}%)</span></div>
          <div style="width: ${arr1 * 1.5}%"><span>레어 (${arr1}%)</span></div>
          <div style="width: ${arr2 * 1.5}%"><span>매직 (${arr2}%)</span></div>
          <div style="width: ${arr3 * 1.5}%"><span>일반 (${arr3}%)</span></div>
              <button onclick="location.reload(true)">새로고침</button>
              </div>
          `;
      document.body.innerHTML = list;
    </script>
  </body>
</html>
