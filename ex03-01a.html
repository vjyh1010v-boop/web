<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>상품 구성 표</title>
    <style>
      table {
        border-collapse: collapse; /* 테두리 사이 틈새 제거 */
        text-align: center;
        width: 100%;
      }
      th,
      td {
        border: 1px solid white; /* 이미지처럼 흰색 선으로 구분 */
        padding: 10px;
      }
      /* 제목 행(용도, 중량 등) 글자색 흰색으로 */
      thead {
        color: white;
        font-weight: bold;
      }
      /* 본문 데이터 글자색 (배경색에 따라 조정) */
      tbody {
        color: black;
      }
      /* 선물용/가정용 칸 글자 진하게 */
      .type-label {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        선물용과 가정용 상품 구성
      </caption>

      <colgroup>
        <col style="background-color: antiquewhite" />
        <col span="2" style="background-color: dodgerblue; color: white" />
        <col style="background-color: darkcyan; color: white" />
      </colgroup>

      <thead>
        <tr>
          <th>용도</th>
          <th>중량</th>
          <th>개수</th>
          <th>가격</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td rowspan="2" class="type-label">선물용</td>
          <td>3kg</td>
          <td>11~16상자</td>
          <td>38,000원</td>
        </tr>
        <tr>
          <td>5kg</td>
          <td>18~26상자</td>
          <td>52,000원</td>
        </tr>
        <tr>
          <td rowspan="2" class="type-label">가정용</td>
          <td>3kg</td>
          <td>11~16상자</td>
          <td>30,000원</td>
        </tr>
        <tr>
          <td>4kg</td>
          <td>18~26상자</td>
          <td>47,000원</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
