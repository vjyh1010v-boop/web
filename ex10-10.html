<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <h1>저는 곧 변합니다.</h1>
    <script>
      /* 방식1 */
      const cg = () => {
        const h1 = document.querySelector("h1");
        h1.textContent = "방식1로 변했어요!";
      };
      setTimeout(cg, 2000);

      /* 방식2 */
      setTimeout(
        () => {},
        (document.querySelector("h1").textContent = "방식2로 변했어요!"),
        4000,
      );

      /* 방식3 - 인자넣기 */
      const cc = (text) => (document.querySelector("h1").textContent = text);
      console.log(setTimeout(() => cc("정말 정말!!!"), 6000));
      console.log(setTimeout(() => cc("잘 변했네요!!!"), 8000));

      /* 방식4 - 인자넣기 */
      setTimeout(cc, 10000, "ㅋㅋㅋㅋ");
      setTimeout(cc, 12000, "이게되넼ㅋㅋㅋㅋ");
      setTimeout(cc, 14000, "진작 알려주지...");
    </script>
  </body>
</html>
