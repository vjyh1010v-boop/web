<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>형제 선택자</title>
    <style>
      h3 ~ p {
        border: 1px solid red;
      }
      li > span ~ p {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h1>2b. 형제 선택자</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <h3>엑스포 안내</h3>
    <p>반갑습니다.</p>
    <span>난 신경쓰지마.</span>
    <p>책자를 배부하고 있습니다.</p>
    <p>안내데스크를 활용하시길 바랍니다.</p>
    <!-- ul>(li>p)^^p{9월에는 가을 이벤트가 시작됩니다.} -->
    <ul>
      <li>
        <span>안내: 생략</span>
        <p>주중에는 정오 이벤트가 있습니다.</p>
      </li>
      <li>
        <div>주의사항: 내용이 없습니다.</div>
        <p>주말에는 자정 이벤트가 있습니다.</p>
      </li>
    </ul>
    <p>9월에는 가을 이벤트가 시작됩니다.</p>
  </body>
</html>
