<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      .box {
        margin: 40% auto;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1><span id="timer">0</span>초 마다 진행</h1>
      <button onclick="start()">시작</button>
      <button onclick="stop()">정지</button>
    </div>
    <script>
      let num = 0; // 전역으로 설정
      let iid; // undefined 로 시작
      const timer = document.querySelector("#timer");
      const start = () => {
        /* if (iid) return; */ // 중복실행 방지
        iid = setInterval(start, 1000);
        timer.textContent = ++num;
      };
      const stop = () => {
        clearTimeout(iid);
        iid = null; // 초기화
      };
    </script>
  </body>
</html>
