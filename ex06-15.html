<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flex</title>
    <style>
      .box {
        display: flex;
        justify-content: flex-start; /* justify-content: flex-start; - 행에서 > 열로 바뀜*/
        align-items: flex-start;
        flex-direction: column-reverse;
      }
      .box > div {
        width: 200px;
        height: 200px;
        background-color: tomato;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        color: white;
      }
      .box > div:nth-of-type(2) {
        background-color: cornflowerblue;
      }
    </style>
  </head>
  <body>
    <h1>flex, flex-direction</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <div class="box">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </body>
</html>
